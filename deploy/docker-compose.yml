services:
  app:
    image: nomenclature-rag:linux-amd64
    container_name: nomenclature-rag
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DATA_FILE=/app/data/rag_assist.xlsx
      - CACHE_DIR=/app/cache
    volumes:
      - rag_cache:/app/cache
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>r.json()).then(j=>process.exit(j.status==='ready'?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 60s

volumes:
  rag_cache:
